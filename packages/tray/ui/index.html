<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:;"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AgentR</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="titlebar">
      <div class="titlebar-drag">
        <img class="title-logo" src="logo.png" alt="" width="22" height="22" />
        <span class="title-wordmark">AgentR</span>
        <span id="status-label" class="title-status">offline</span>
      </div>
      <div class="titlebar-controls">
        <button type="button" id="win-min" aria-label="Minimize">─</button>
        <button type="button" id="win-close" aria-label="Close" class="close">✕</button>
      </div>
    </header>

    <div class="shell">
      <p class="pair-line">
        <button type="button" id="pairing-btn" class="pair-btn">/pair --------</button>
        <span class="muted">copy for Teams</span>
      </p>

      <label class="field">
        <span>Relay URL</span>
        <input
          id="relayUrl"
          type="url"
          spellcheck="false"
          placeholder="wss://your-domain/ws"
          autocomplete="off"
        />
      </label>

      <label class="field">
        <span>Worker token</span>
        <p id="token-saved" class="saved" hidden></p>
        <div class="row">
          <input
            id="workerToken"
            type="password"
            spellcheck="false"
            placeholder="Paste token from VM"
            autocomplete="off"
            data-lpignore="true"
            data-1p-ignore="true"
          />
          <button type="button" id="toggle-token" class="text-btn">Show</button>
        </div>
      </label>

      <div class="field">
        <div class="row between">
          <span>Projects</span>
          <button type="button" id="add-project" class="text-btn">Add</button>
        </div>
        <p class="hint">Teams: <code>[alias] your prompt</code></p>
        <div id="projects" class="projects"></div>
      </div>

      <label class="check">
        <input id="dryRun" type="checkbox" />
        <span>Dry run</span>
      </label>

      <label class="field">
        <span>Agent command</span>
        <input id="agentCommand" type="text" spellcheck="false" value="agent" />
      </label>

      <footer class="footer">
        <p id="save-msg" class="save-msg" hidden></p>
        <button type="button" id="reconnect" class="btn">Reconnect</button>
        <button type="button" id="save" class="btn btn-main">Save &amp; connect</button>
      </footer>
    </div>
    <script src="renderer.js"></script>
  </body>
</html>
